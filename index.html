<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手把手·AI教研工具系列</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        
        body {
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }
        
        h1 {
            font-size: 2rem;
            color: #2c5530;
            margin-bottom: 30px;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        h1:hover {
            color: #5a7d5a;
        }
        
        /* loading区块已完全删除（原提示文字已移除） */
        
        .buttons {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        
        .jump-button {
            padding: 12px 30px;
            background-color: #2c5530;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            min-width: 220px;
        }
        
        .jump-button:hover {
            background-color: #5a7d5a;
            transform: translateY(-2px);
        }
        
        .jump-button.primary {
            background-color: #2c5530;
            font-weight: bold;
        }

        /* 易文通按钮采用略有区别的绿色，文字已改为“易文通·本地模型” */
        .jump-button.rewrite {
            background-color: #3d6b41;
            font-weight: bold;
        }
        .jump-button.rewrite:hover {
            background-color: #5f8a63;
        }
        
        .jump-button.fallback {
            background-color: #8a6d3b;
        }
        
        .jump-button.fallback:hover {
            background-color: #a47c3b;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        
        .status.info {
            background-color: #e8f4fd;
            color: #0066cc;
        }
        
        .status.success {
            background-color: #f0f9eb;
            color: #67c23a;
        }
        
        .status.fallback {
            background-color: #fdf6ec;
            color: #e6a23c;
        }
        
        .status.error {
            background-color: #fef0f0;
            color: #f56c6c;
        }
        
        .instructions {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #666;
            text-align: left;
        }
        
        .instructions h3 {
            color: #2c5530;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .instructions ul {
            padding-left: 20px;
        }
        
        .instructions li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="鉴真AIGC检测器（本地模型）" class="logo">
        <h1 id="jumpLink">AIGC检测/改写工具</h1>        
        
        <!-- 原loading区块已完全删除（曾显示“请选择要访问的链接...”） -->
        
        <div class="buttons">
            <button id="primaryJump" class="jump-button primary">
                鉴真AI·本地模型
            </button>
            <!-- 新增按钮：文字已改为“易文通·本地模型”，链接已独立（下方JS中定义） -->
            <button id="rewriteJump" class="jump-button rewrite">
                易文通·本地模型
            </button>
            <button id="fallbackJump" class="jump-button fallback">
                 朱雀AI检测助手 
            </button>
        </div>        
        
        <!-- 状态条初始文字已清空（原“请点击上方按钮...”已删除） -->
        <div id="status" class="status info"></div>        
        
        <div class="instructions">
            <h3>使用说明：</h3>
            <ul>
                <li><strong>鉴真AI</strong> - AIGC检测的本地模型版（进入后再点击“Visit Site”即可）</li>
                <!-- 下方strong文字同步改为“易文通·本地模型”，与按钮一致 -->
                <li><strong>易文通</strong> - 专注教育类文本的去AI化（本地模型测试版，因服务器配置较低，不要输入超过500字的长文本。且要等页面有“模型已连接”的提示后再检测）</li>
                <li><strong>备用链接</strong> - 腾讯开发的朱雀AI检测助手官网</li>
                <li>基于本地模型和服务器的AIGC检测与改写工具——不定期交替开放使用，如果页面无法正常访问，说明服务器当前未开放</li>
            </ul>
        </div>
    </div>

    <script>
        // --- 链接配置区（可独立修改）---
        // 鉴真AI·本地模型 链接
        const primaryUrl = 'https://www.shnuyl.cn/aigc';
        
        // 易文通·本地模型 链接 —— 现已独立，不与上方相同，便于单独修改
        // 请将下方链接替换为实际的易文通独立地址
        const rewriteUrl = 'https://ba41-117-143-16-56.ngrok-free.app';  // ⚠️ 请修改为真实链接
        
        // 朱雀AI检测助手 备用链接
        const fallbackUrl = 'https://matrix.tencent.com/ai-detect/';
        
        // 获取元素
        const jumpLink = document.getElementById('jumpLink');
        const primaryButton = document.getElementById('primaryJump');
        const rewriteButton = document.getElementById('rewriteJump');
        const fallbackButton = document.getElementById('fallbackJump');
        const statusElement = document.getElementById('status');
        
        // 更新状态显示
        function updateStatus(message, type) {
            statusElement.textContent = message;
            statusElement.className = 'status ' + type;
        }
        
        // 执行跳转
        function performJump(url, linkType) {
            console.log(`正在跳转到${linkType}链接:`, url);
            updateStatus(`正在跳转到${linkType}链接...`, 'info');
            
            // 添加短暂延迟让用户看到状态变化
            setTimeout(() => {
                window.location.href = url;
            }, 300);
        }
        
        // 标题点击 - 跳转到默认链接（本地模型）
        jumpLink.addEventListener('click', function() {
            performJump(primaryUrl, '默认(本地模型)');
        });
        
        // 鉴真AI·本地模型 按钮点击
        primaryButton.addEventListener('click', function() {
            performJump(primaryUrl, '本地模型');
        });
        
        // 易文通·本地模型 按钮点击 —— 使用独立的 rewriteUrl
        rewriteButton.addEventListener('click', function() {
            performJump(rewriteUrl, '易文通·本地模型');  // 状态提示也相应调整
        });
        
        // 备用链接按钮点击
        fallbackButton.addEventListener('click', function() {
            performJump(fallbackUrl, '备用');
        });
        
        // 键盘快捷键支持（1:本地模型, 2:易文通·本地模型, 3:备用）
        document.addEventListener('keydown', function(event) {
            // 按1选择本地模型（鉴真AI）
            if (event.key === '1') {
                performJump(primaryUrl, '本地模型');
            }
            // 按2选择易文通·本地模型（独立链接）
            else if (event.key === '2') {
                performJump(rewriteUrl, '易文通·本地模型');
            }
            // 按3选择备用链接
            else if (event.key === '3') {
                performJump(fallbackUrl, '备用');
            }
        });
        
        // 页面加载完成后的初始化
        window.addEventListener('load', function() {
            console.log('页面加载完成，等待用户选择链接');
            console.log('鉴真AI·本地模型:', primaryUrl);
            console.log('易文通·本地模型 (独立链接):', rewriteUrl);  // 确认独立
            console.log('备用链接:', fallbackUrl);
            console.log('快捷键: 按1本地模型(鉴真)，按2易文通·本地模型，按3备用链接');
            // 状态条初始为空，不显示任何提示文字，符合删除要求
        });
    </script>
</body>
</html>
